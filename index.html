{!inApp&&<p style={{fontSize:11,color:"#4b5060",marginTop:16}}>จะมีหน้าต่าง Google ขึ้นมาให้เลือกบัญชี</p>}

function App(){const[user,setUser]=useState(undefined);useEffect(()=>{const u=auth.onAuthStateChanged(u=>setUser(u||null));return u;},[]);if(user===undefined)return<div style={{minHeight:"100vh",background:"#0c0e13",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#6b7280",animation:"pulse 1.5s infinite",fontSize:14}}>กำลังโหลด...</div></div>;if(!user)return<LoginScreen/>;return<MainApp user={user}/>;}

function MainApp({user}){
const[eO,eL]=useFB("employees",{});
const[evO,evL]=useFB("evaluations",{});

const[lO,lL]=useFB("leaders",{});

const[conn,setConn]=useState(false);

useEffect(()=>{const r=db.ref(".info/connected");const h=r.on("value",s=>setConn(!!s.val()));return()=>r.off("value",h);},[]);
// Init super admin
useEffect(()=>{if(!aL){const admins=aO||{};if(!Object.values(admins).some(a=>a.email===SA))fbP("admins",{email:SA,name:"Super Admin",addedAt:Date.now()});};},[aL,aO]);

const emps=eO?Object.entries(eO).map(([k,v])=>({...v,_key:k})):[];
const evals=evO?Object.entries(evO).map(([k,v])=>({...v,_key:k})):[];
const leaders=lO||{};const admins=aO||{};
const teamCats=tcO||{};
const loading=eL||evL||tcL||lL||aL;

// Get categories for a team — fallback to defaults
const getCats=(teamId)=>{
  const tc=teamCats[teamId];
  if(tc){return Array.isArray(tc)?tc:Object.values(tc);}
  return DC;
};
// Init team categories when first accessing settings
const initTeamCats=async(teamId)=>{
  if(!teamCats[teamId]){await fbS("team_categories/"+teamId,DC);}
};

const aEmails=Object.values(admins).map(a=>a.email?.toLowerCase());
const isAdmin=aEmails.includes(user.email?.toLowerCase())||user.email?.toLowerCase()===SA;
const myTeams=Object.entries(leaders).filter(([_,v])=>v.email?.toLowerCase()===user.email?.toLowerCase()).map(([_,v])=>v.teamId);
const isLeader=myTeams.length>0;
const accTeams=isAdmin?TEAMS.map(t=>t.id):myTeams;

const[view,setView]=useState("dashboard");
const[selTeam,setSelTeam]=useState(null);
const[evalTarget,setEvalTarget]=useState(null);
const[viewResult,setViewResult]=useState(null);
const[sidebarOpen,setSO]=useState(false);
const[showAddEmp,setSAE]=useState(false);
const[showAddCat,setSAC]=useState(false);
const[showAddCrit,setShowAddCrit]=useState(null);
const[showAddLeader,setSAL]=useState(false);
const[showAddAdmin,setSAA]=useState(false);
const[editEmp,setEditEmp]=useState(null);
const[nE,setNE]=useState({name:"",team:"",role:"",isLeader:false});
const[nC,setNC]=useState({name:"",nameEn:"",icon:"📋"});
const[nCr,setNCr]=useState({name:"",nameEn:"",desc:""});
const[nL,setNL]=useState({email:"",teamId:""});
const[nA,setNA]=useState({email:"",name:""});
const[eS,setES]=useState({});
const[eN,setEN]=useState("");
const[saving,setSV]=useState(false);
const[selYear,setSY]=useState(getCQ().y);

const nav=(v,t=null)=>{setView(v);setSelTeam(t);setSO(false);};
const{q:curQ,y:curY}=getCQ();

const visEmps=isAdmin?emps:emps.filter(e=>accTeams.includes(e.team));
const teamEmps=selTeam?visEmps.filter(e=>e.team===selTeam.id):[];

const gEQ=(eid,q,y)=>evals.find(e=>e.employeeId===eid&&e.quarter===q&&e.year===y);

const cYA=(eid,y)=>{const evs=gEY(eid,y);if(!evs.length)return 0;const avgs=evs.map(e=>cA(e.scores)).filter(a=>a>0);return avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:0;};
const pE=useMemo(()=>visEmps.filter(emp=>!gEQ(emp.id,curQ,curY)),[visEmps,evals,curQ,curY]);

// CRUD
const addEmp=async()=>{const t=nE.team||selTeam?.id||"";if(!nE.name.trim()||!t)return;setSV(true);await fbP("employees",{id:uid(),name:nE.name.trim(),team:t,role:nE.role.trim(),isLeader:nE.isLeader,createdAt:Date.now()});setNE({name:"",team:"",role:"",isLeader:false});setSAE(false);setSV(false);};

const addCat=async()=>{if(!nC.name.trim())return;setSV(true);const cur=getCats(settingsTeam);await fbS("team_categories/"+settingsTeam,[...cur,{id:uid(),name:nC.name.trim(),nameEn:nC.nameEn.trim(),icon:nC.icon||"📋",criteria:[]}]);setNC({name:"",nameEn:"",icon:"📋"});setSAC(false);setSV(false);};

{cats.filter(cat=>cat.id!=="leadership"||viewResult.isLeader).map(cat=>{const cs=(cat.criteria||[]).map(cr=>latest.scores?.[cr.id]).filter(v=>v>0);const ca2=cs.length?cs.reduce((a,b)=>a+b,0)/cs.length:0;return<div key={cat.id} style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:15}}>{cat.icon}</span><span style={{fontSize:13,fontWeight:700,color:"#e0e0e0"}}>{cat.name}</span></div><span style={{fontSize:15,fontWeight:700,color:sC(ca2)}}>{ca2>0?ca2.toFixed(1):"-"}<span style={{fontSize:10,color:"#6b7280"}}>/10</span></span></div>
{(cat.criteria||[]).map(cr=>{const sc=latest.scores?.[cr.id]||0;return<div key={cr.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid #1e2028"}}><span style={{fontSize:12,color:"#c0c4d0"}}>{cr.name}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{sc>0&&<span style={{fontSize:10,color:sC(sc)}}>{sL(sc)}</span>}<span style={{width:30,height:28,borderRadius:7,background:sc>0?sC(sc)+"18":"#1e2028",color:sc>0?sC(sc):"#4b5060",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>{sc||"-"}</span></div></div>})}</div>})}
{latest.note&&<div style={S.card}><div style={{fontSize:11,fontWeight:600,color:"#6b7280",marginBottom:6}}>หมายเหตุ</div><div style={{fontSize:12,color:"#c0c4d0",lineHeight:1.6}}>{latest.note}</div></div>}
{latest.evaluatedBy&&<div style={{fontSize:10,color:"#4b5060",marginBottom:12}}>โดย: {latest.evaluatedBy} • {new Date(latest.date).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"})}</div>}</>})()}
</div>})()}

{/* YEARLY */}
{view==="yearly"&&<div style={{animation:"slideUp .3s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}><h2 style={{fontSize:20,fontWeight:700,color:"#f0f0f0"}}>สรุปคะแนนรายปี</h2><div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>setSY(selYear-1)} style={S.btnO("#6b7280")}>◀</button><span style={{fontSize:16,fontWeight:700,color:"#5B8DEF",minWidth:50,textAlign:"center"}}>{selYear}</span><button onClick={()=>setSY(selYear+1)} style={S.btnO("#6b7280")}>▶</button></div></div>
{visTeams.map(t=>{const te=visEmps.filter(e=>e.team===t.id);if(!te.length)return null;return<div key={t.id} style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><span style={{fontSize:16}}>{t.icon}</span><span style={{fontSize:14,fontWeight:700,color:t.color}}>{t.name}</span></div><div style={{...S.card,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{borderBottom:"1px solid #1e2028"}}><th style={{textAlign:"left",padding:"8px 10px",color:"#6b7280",fontWeight:600}}>พนักงาน</th>{[1,2,3,4].map(q=><th key={q} style={{textAlign:"center",padding:"8px 6px",color:q===curQ&&selYear===curY?"#5B8DEF":"#6b7280",fontWeight:600}}>Q{q}</th>)}<th style={{textAlign:"center",padding:"8px 10px",color:"#F59E0B",fontWeight:700}}>เฉลี่ยรวม</th></tr></thead><tbody>{te.map(emp=>{const ya2=cYA(emp.id,selYear);return<tr key={emp._key} style={{borderBottom:"1px solid #1e202808"}}><td style={{padding:"8px 10px",color:"#e0e0e0",fontWeight:500}}>{emp.name}</td>{[1,2,3,4].map(q=>{const ev=gEQ(emp.id,q,selYear);const a=ev?cA(ev.scores):0;return<td key={q} style={{textAlign:"center",padding:"8px 6px",color:a>0?sC(a):"#2a2d35",fontWeight:a>0?700:400}}>{a>0?a.toFixed(1):"-"}</td>})}<td style={{textAlign:"center",padding:"8px 10px",fontWeight:700,fontSize:14,color:ya2>0?sC(ya2):"#2a2d35"}}>{ya2>0?ya2.toFixed(2):"-"}</td></tr>})}</tbody></table></div></div>})}</div>}

{/* MANAGE ADMINS */}
{view==="manage_admins"&&isAdmin&&<div style={{animation:"slideUp .3s ease",maxWidth:650}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}><div><h2 style={{fontSize:20,fontWeight:700,color:"#f0f0f0",margin:0}}>จัดการ Admin</h2><p style={{color:"#6b7280",fontSize:12,marginTop:3}}>Admin ดูได้ทุกทีมและจัดการระบบทั้งหมด</p></div><button onClick={()=>setSAA(true)} style={S.btn("#E8453C")}>+ เพิ่ม Admin</button></div>
{Object.entries(admins).map(([k,v])=>{const isSup=v.email?.toLowerCase()===SA;return<div key={k} style={{...S.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:"#E8453C18",color:"#E8453C",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🛡️</div><div><div style={{fontSize:13,fontWeight:600,color:"#f0f0f0"}}>{v.email}{isSup&&<Badge color="#F59E0B" style={{marginLeft:6}}>Super</Badge>}</div>{v.name&&<div style={{fontSize:11,color:"#6b7280"}}>{v.name}</div>}</div></div>{!isSup&&<button onClick={()=>rmAdmin(k,v.email)} style={{background:"none",border:"1.5px solid #EF444440",color:"#EF4444",padding:"8px 12px",borderRadius:10,fontSize:12,fontWeight:600}}>ลบ</button>}</div>})}</div>}

{/* MANAGE LEADERS */}
{view==="manage_leaders"&&isAdmin&&<div style={{animation:"slideUp .3s ease",maxWidth:650}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}><div><h2 style={{fontSize:20,fontWeight:700,color:"#f0f0f0",margin:0}}>จัดการหัวหน้าทีม</h2></div><button onClick={()=>setSAL(true)} style={S.btn("#5B8DEF")}>+ เพิ่มหัวหน้าทีม</button></div>
{Object.entries(leaders).map(([k,v])=>{const t=gT(v.teamId);return<div key={k} style={{...S.card,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:(t?.color||"#5B8DEF")+"18",color:t?.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{t?.icon||"👤"}</div><div><div style={{fontSize:13,fontWeight:600,color:"#f0f0f0"}}>{v.email}</div><Badge color={t?.color}>{t?.name||v.teamId}</Badge></div></div><button onClick={()=>rmLeader(k)} style={{background:"none",border:"1.5px solid #EF444440",color:"#EF4444",padding:"8px 12px",borderRadius:10,fontSize:12,fontWeight:600}}>ลบ</button></div>})}</div>}

{/* SETTINGS — per team */}
{view==="settings"&&isAdmin&&<div style={{animation:"slideUp .3s ease",maxWidth:700}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:10}}>
<h2 style={{fontSize:20,fontWeight:700,color:"#f0f0f0",margin:0}}>ตั้งค่าหัวข้อประเมิน</h2>
<button onClick={()=>setSAC(true)} style={S.btn("#5B8DEF")}>+ เพิ่มหมวด</button>
</div>
<p style={{color:"#6b7280",fontSize:12,marginBottom:16}}>แต่ละทีมมีหัวข้อประเมินแยกกัน เลือกทีมเพื่อปรับแต่ง</p>

{/* Team selector tabs */}
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
{TEAMS.map(t=>{const active=settingsTeam===t.id;return<button key={t.id} onClick={()=>{setSettingsTeam(t.id);initTeamCats(t.id);}} style={{padding:"7px 14px",borderRadius:10,border:active?"2px solid "+t.color:"1.5px solid #2a2d35",background:active?t.color+"15":"#1a1d24",color:active?t.color:"#6b7280",fontWeight:600,fontSize:11,display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:13}}>{t.icon}</span>{t.name}</button>})}
</div>

{/* Copy from another team */}
<div style={{...S.card,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
<span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>คัดลอกหัวข้อจากทีม:</span>
{TEAMS.filter(t=>t.id!==settingsTeam).map(t=><button key={t.id} onClick={()=>copyFromTeam(t.id)} style={{padding:"4px 10px",borderRadius:7,border:"1px solid #2a2d35",background:"#1a1d24",color:"#8b8fa4",fontSize:10,fontWeight:600}}>{t.icon} {t.name}</button>)}
<button onClick={resetCats} style={{padding:"4px 10px",borderRadius:7,border:"1px solid #F9731640",background:"transparent",color:"#F97316",fontSize:10,fontWeight:600}}>🔄 รีเซ็ตค่าเริ่มต้น</button>
</div>

{/* Categories for selected team */}
<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,marginTop:4}}><span style={{fontSize:18}}>{sTeam?.icon}</span><span style={{fontSize:16,fontWeight:700,color:sTeam?.color}}>{sTeam?.name}</span><span style={{fontSize:12,color:"#6b7280"}}>— {sCats.reduce((s,c)=>s+(c.criteria||[]).length,0)} เกณฑ์</span></div>

{sCats.map(cat=><div key={cat.id} style={S.card}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
<div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:18}}>{cat.icon}</span><span style={{fontSize:14,fontWeight:700,color:"#e0e0e0"}}>{cat.name}</span><span style={{fontSize:11,color:"#6b7280"}}>{cat.nameEn}</span></div>
<div style={{display:"flex",gap:6}}><button onClick={()=>setShowAddCrit(cat.id)} style={S.btnO("#10B981")}>+ เกณฑ์</button><button onClick={()=>rmCat(cat.id)} style={S.btnO("#EF4444")}>ลบหมวด</button></div></div>
{(!cat.criteria||cat.criteria.length===0)?<div style={{fontSize:11,color:"#4b5060",padding:"10px 0"}}>ยังไม่มีเกณฑ์</div>:cat.criteria.map(cr=><div key={cr.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid #1e2028"}}><div><span style={{fontSize:12,fontWeight:600,color:"#c0c4d0"}}>{cr.name}</span>{cr.nameEn&&<span style={{fontSize:10,color:"#6b7280",marginLeft:6}}>{cr.nameEn}</span>}{cr.desc&&<div style={{fontSize:10,color:"#4b5060",marginTop:1}}>{cr.desc}</div>}</div><button onClick={()=>rmCrit(cat.id,cr.id)} style={{background:"none",border:"none",color:"#EF4444",fontSize:15,padding:4}}>✕</button></div>)}
</div>)}
</div>}

</div>

{/* MODALS */}
<Modal open={showAddEmp} onClose={()=>setSAE(false)} title="เพิ่มพนักงาน"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={S.label}>ชื่อ-นามสกุล</label><input style={S.input} value={nE.name} onChange={e=>setNE({...nE,name:e.target.value})} placeholder="ชื่อพนักงาน"/></div><div><label style={S.label}>ทีม</label><select style={S.input} value={nE.team} onChange={e=>setNE({...nE,team:e.target.value})}><option value="">เลือกทีม</option>{TEAMS.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div><div><label style={S.label}>ตำแหน่ง</label><input style={S.input} value={nE.role} onChange={e=>setNE({...nE,role:e.target.value})} placeholder="ตำแหน่งงาน"/></div><label style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox" checked={nE.isLeader} onChange={e=>setNE({...nE,isLeader:e.target.checked})}/><span style={{fontSize:12,color:"#c0c4d0"}}>เป็นหัวหน้างาน</span></label><button onClick={addEmp} disabled={saving} style={{...S.btn("#10B981"),marginTop:4}}>{saving?"บันทึก...":"เพิ่มพนักงาน"}</button></div></Modal>

<Modal open={!!editEmp} onClose={()=>setEditEmp(null)} title="แก้ไขข้อมูลพนักงาน">{editEmp&&<div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={S.label}>ชื่อ-นามสกุล</label><input style={S.input} value={editEmp.name} onChange={e=>setEditEmp({...editEmp,name:e.target.value})}/></div><div><label style={S.label}>ตำแหน่ง</label><input style={S.input} value={editEmp.role||""} onChange={e=>setEditEmp({...editEmp,role:e.target.value})}/></div><div><label style={S.label}>ทีม</label><select style={S.input} value={editEmp.team} onChange={e=>setEditEmp({...editEmp,team:e.target.value})}>{TEAMS.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div><label style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox" checked={editEmp.isLeader||false} onChange={e=>setEditEmp({...editEmp,isLeader:e.target.checked})}/><span style={{fontSize:12,color:"#c0c4d0"}}>เป็นหัวหน้างาน</span></label><div style={{background:"#5B8DEF10",border:"1px solid #5B8DEF30",borderRadius:10,padding:12,fontSize:11,color:"#5B8DEF",lineHeight:1.5}}>💡 คะแนนประเมินที่ให้ไปแล้วจะไม่เปลี่ยนแปลง</div><button onClick={edEmp} disabled={saving} style={{...S.btn("#5B8DEF"),marginTop:4}}>{saving?"บันทึก...":"บันทึกการแก้ไข"}</button></div>}</Modal>

<Modal open={showAddAdmin} onClose={()=>setSAA(false)} title="เพิ่ม Admin"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={S.label}>Email (Google Account)</label><input style={S.input} value={nA.email} onChange={e=>setNA({...nA,email:e.target.value})} placeholder="email@gmail.com" type="email"/></div><div><label style={S.label}>ชื่อ (ไม่บังคับ)</label><input style={S.input} value={nA.name} onChange={e=>setNA({...nA,name:e.target.value})} placeholder="ชื่อ"/></div><button onClick={addAdmin} disabled={saving} style={{...S.btn("#E8453C"),marginTop:4}}>{saving?"บันทึก...":"เพิ่ม Admin"}</button></div></Modal>

<Modal open={showAddLeader} onClose={()=>setSAL(false)} title="เพิ่มหัวหน้าทีม"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={S.label}>Email (Google Account)</label><input style={S.input} value={nL.email} onChange={e=>setNL({...nL,email:e.target.value})} placeholder="email@gmail.com" type="email"/></div><div><label style={S.label}>ดูแลทีม</label><select style={S.input} value={nL.teamId} onChange={e=>setNL({...nL,teamId:e.target.value})}><option value="">เลือกทีม</option>{TEAMS.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div><div style={{background:"#F59E0B10",border:"1px solid #F59E0B30",borderRadius:10,padding:12,fontSize:11,color:"#F59E0B",lineHeight:1.5}}>💡 ดูได้เฉพาะทีมที่กำหนด ถ้าดูแลหลายทีมให้เพิ่มหลายรายการ</div><button onClick={addLeader} disabled={saving} style={{...S.btn("#10B981"),marginTop:4}}>{saving?"บันทึก...":"เพิ่มหัวหน้าทีม"}</button></div></Modal>

<Modal open={showAddCat} onClose={()=>setSAC(false)} title={"เพิ่มหมวดประเมิน — "+sTeam?.name}><div style={{display:"flex",flexDirection:"column",gap:12}}><div style={{background:sTeam?.color+"10",border:"1px solid "+sTeam?.color+"30",borderRadius:10,padding:10,fontSize:11,color:sTeam?.color}}>เพิ่มหมวดให้ทีม <strong>{sTeam?.name}</strong> เท่านั้น</div><div><label style={S.label}>ชื่อหมวด (ไทย)</label><input style={S.input} value={nC.name} onChange={e=>setNC({...nC,name:e.target.value})} placeholder="เช่น ความคิดสร้างสรรค์"/></div><div><label style={S.label}>ชื่อหมวด (English)</label><input style={S.input} value={nC.nameEn} onChange={e=>setNC({...nC,nameEn:e.target.value})} placeholder="e.g. Creativity"/></div><div><label style={S.label}>ไอคอน</label><input style={{...S.input,width:80}} value={nC.icon} onChange={e=>setNC({...nC,icon:e.target.value})}/></div><button onClick={addCat} disabled={saving} style={{...S.btn("#10B981"),marginTop:4}}>{saving?"บันทึก...":"เพิ่มหมวด"}</button></div></Modal>

<Modal open={!!showAddCrit} onClose={()=>setShowAddCrit(null)} title={"เพิ่มเกณฑ์: "+(sCats.find(c=>c.id===showAddCrit)?.name||"")}><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={S.label}>ชื่อเกณฑ์ (ไทย)</label><input style={S.input} value={nCr.name} onChange={e=>setNCr({...nCr,name:e.target.value})} placeholder="เช่น ทักษะการนำเสนอ"/></div><div><label style={S.label}>ชื่อเกณฑ์ (English)</label><input style={S.input} value={nCr.nameEn} onChange={e=>setNCr({...nCr,nameEn:e.target.value})} placeholder="e.g. Presentation Skills"/></div><div><label style={S.label}>คำอธิบาย</label><input style={S.input} value={nCr.desc} onChange={e=>setNCr({...nCr,desc:e.target.value})} placeholder="รายละเอียด"/></div><button onClick={addCrit} disabled={saving} style={{...S.btn("#10B981"),marginTop:4}}>{saving?"บันทึก...":"เพิ่มเกณฑ์"}</button></div></Modal>

</div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
